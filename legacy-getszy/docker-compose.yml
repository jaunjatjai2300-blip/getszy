version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: getszy-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks: [getszy]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: getszy-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "getszy_db"
      CORS_ORIGINS: "https://${DOMAIN},https://www.${DOMAIN}"
      JWT_SECRET: "${JWT_SECRET}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@getszy.com}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-Admin@123}"
      SEED_CUSTOMER_EMAIL: "${SEED_CUSTOMER_EMAIL:-customer@getszy.com}"
      SEED_CUSTOMER_PASSWORD: "${SEED_CUSTOMER_PASSWORD:-Demo@123}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}"
      HF_API_KEY: "${HF_API_KEY:-}"
      HF_MODEL: "${HF_MODEL:-Qwen/Qwen2.5-72B-Instruct}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      FREE_ONLY: "${FREE_ONLY:-true}"
      LLM_PROVIDER: "${LLM_PROVIDER:-auto}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
      EMERGENT_LLM_KEY: "${EMERGENT_LLM_KEY:-}"
      EMERGENT_MODEL: "${EMERGENT_MODEL:-gpt-4o-mini}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GITHUB_REPO: "${GITHUB_REPO:-jaunjatjai2300-blip/getszy}"
      GITHUB_BRANCH: "${GITHUB_BRANCH:-main}"
      DEPLOY_WEBHOOK_URL: "${DEPLOY_WEBHOOK_URL:-}"
      DEPLOY_WEBHOOK_TOKEN: "${DEPLOY_WEBHOOK_TOKEN:-}"
      RAZORPAY_KEY_ID: "${RAZORPAY_KEY_ID:-}"
      RAZORPAY_KEY_SECRET: "${RAZORPAY_KEY_SECRET:-}"
      RAZORPAY_WEBHOOK_SECRET: "${RAZORPAY_WEBHOOK_SECRET:-}"
      RAZORPAY_PLAN_PRO: "${RAZORPAY_PLAN_PRO:-}"
      RAZORPAY_PLAN_ELITE: "${RAZORPAY_PLAN_ELITE:-}"
    networks: [getszy]
    volumes:
      - backend_media:/app/backend/media
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: "${PUBLIC_URL}"
    container_name: getszy-frontend
    restart: unless-stopped
    depends_on: [backend]
    networks: [getszy]

  caddy:
    image: caddy:2-alpine
    container_name: getszy-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [backend, frontend]
    networks: [getszy]

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
  backend_media:

networks:
  getszy:
    driver: bridge
