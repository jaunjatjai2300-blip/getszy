name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS Deploy
        run: |
          curl -s -X POST https://getszy.com/hooks/deploy \
            -H "X-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 300
